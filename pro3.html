<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h2 {
            color: blue;
            text-align: center;
        }

        .internal-style {
            color: green;
            font-size: 18px;
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="sty.css">
</head>

<body>

    <h2>Types of CSS</h2>

    <!-- Inline CSS -->
    <p style="color: red; font-weight: bold;">
        This paragraph uses Inline CSS.
    </p>

    <!-- Internal CSS -->
    <p class="internal-style">
        This paragraph uses Internal CSS.
    </p>

    <!-- External CSS -->
    <p class="external-style">
        This paragraph uses External CSS.
    </p>

</body>
</html>
