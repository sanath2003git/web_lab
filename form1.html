<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title> 

</head>
<body>
        <!--form title-->
        <h3 style="text-decoration: bo ;">program 2 Form</h3>
        <!--form input div-->
    <div style="border: 2px solid black; border-radius:  10px; width: 350px; height: 550px; padding: 50px;">
        <form action="#">
        <label for="name">Enter Name :</label>
        <input type="text" name="name" value="sam" placeholder="Enter Name" style="border:2px solid lightslategray;border-radius:  5px; height: 25px;"><br><br>
        <label for="email">Enter Email :</label>
        <input type="email" name="email" placeholder="sam@gmail.com"style="border:2px solid lightslategray;border-radius:  5px; height: 25px;"><br><br>
        <label for="number">Enter Number :</label>
        <input type="number" name="number" placeholder="Enter Number"style="border:2px solid lightslategray;border-radius:  5px; height: 25px;"><br><br>
        <label for="pass">Enter Password :</label>
        <input type="password" name="pass" placeholder="Enter Password"style="border:2px solid lightslategray;border-radius:  5px; height: 25px;"><br><br>
        <label for="qual">select qualification :</label>
        <select name="qualification" id=""style="border:2px solid lightslategray;border-radius:  5px; height: 25px;">
            <option value="">bsc</option>
            <option value="">bca</option>
            <option value="">ba</option>
            <option value="">bc</option>
            <option value="">tt</option>
        </select><br><br>
        <!--form radio button-->
        <label for="gender">gender :</label>
        <input type="radio" name="gender">male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">other<br><br>
        <label for="message">message </label>
        <textarea name="" id="" style="border:2px solid lightslategray;border-radius:  5px; height: 45px;">enter your message</textarea><br><br>
        <label for="dob">Date of birth :</label>
        <input type="date"style="border:2px solid lightslategray;border-radius:  5px; height: 25px;"><br><br>
        <label for="resume">upload a resume :</label>
        <input type="file"><br><br>
        <label for="color">color :</label>
        <input type="color"><br><br>
        <label for="sub">sub to newsletter :</label>
        <input type="checkbox"><br><br>
        <div>
            <!--form reset and submit button-->
            <button type="reset" style="border-radius:  10px; width: 45%; height: 35px; background-color: rgb(247, 85, 85); color: aliceblue;">Reset</button>
            <button type="submit" style="border-radius:  10px; width: 45%;height: 35px;background-color: rgb(85, 247, 107);color: aliceblue;">Submit</button>
        </div>
        
    </form>
    </div>

</body>
</html>
