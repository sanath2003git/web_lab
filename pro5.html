<!DOCTYPE html>
<html>
<head>
    <title>Blog Comment Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #88d4ab,#67b99a,#469d89,#248277,#036666);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
        }

        .input-group label {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #777;
            background: white;
            padding: 0 5px;
            transition: 0.3s;
            pointer-events: none;
        }

        /* Floating effect */
        .input-group input:focus + label,
        .input-group input:valid + label,
        .input-group textarea:focus + label,
        .input-group textarea:valid + label {
            top: -8px;
            font-size: 12px;
            color: #036666;
        }

        button { 
            
            width: 100%;
            padding: 10px;
            background: #6a5acd;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #003c86;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Submit Your Comment</h2>

        <form>

            <div class="input-group">
                <input type="text" name="name" required>
                <label>Name</label>
            </div>

            <div class="input-group">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <textarea name="comment" rows="4" required></textarea>
                <label>Comment</label>
            </div>

            <button type="submit">Submit Comment</button>

        </form>
    </div>

</body>
</html>
